baseURL = "http://localhost:1313/"
theme = "hugo-ficurinia"
title = "0x3lk"
languageCode = "en"
defaultContentLanguage = "en"

summaryLength = 70

[markup]
    [markup.goldmark.renderer]
        unsafe = true
    [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
            block  = [['$$', '$$']]
            inline = [['$', '$']]

[pagination]
    pagerSize = 5

[params]
    [params.author]
        name = "0x3lk"
        email = "oussamaeuler@gmail.com"
    description = "Offensive Security research — pentesting, red team, kernel exploitation, reverse engineering."

    posts = "posts"
    showPostsLink = true

    logo = "/logo.svg"
    favicon = "/favicon.png"
    faviconIco = "/favicon.ico"
    appletouch = "/apple-touch-icon.png"
    icon512 = "/icon512.png"

    showTags = true
    showRss = false

    articleSummary = true
    fontFamily = "JetBrains Mono"
    titleFontFamily = "JetBrains Mono"
    monospaceFontFamily = "JetBrains Mono"

    enableSearch = true
    searchbarEverywhere = true

[menu]
    [[menu.main]]
        identifier = "about"
        name = "About"
        url = "/about/"
        weight = 10
