baseURL = "https://0x3lk.github.io/"
theme = "hugo-ficurinia"
title = "0x3lk"
languageCode = "en"
defaultContentLanguage = "en"

enableRobotsTXT = true
canonifyURLs = true

summaryLength = 70

[pagination]
pagerSize = 5

[outputs]
home = ["HTML", "RSS"]
section = ["HTML"]
taxonomy = ["HTML"]
term = ["HTML"]

[markup]
  [markup.goldmark.renderer]
    unsafe = true

  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block  = [['$$', '$$']]
      inline = [['$', '$']]

[params]
  description = "Offensive Security research — pentesting, red team, kernel exploitation, reverse engineering."

  posts = "posts"
  showPostsLink = true

  showTags = true
  showRss = true
  articleSummary = true

  fontFamily = "JetBrains Mono"
  titleFontFamily = "JetBrains Mono"
  monospaceFontFamily = "JetBrains Mono"

  enableSearch = true
  searchbarEverywhere = true

  [params.author]
    name = "0x3lk"
    email = "oussamaeuler@gmail.com"

# Home, Posts and Tags links are added automatically by the Ficurinia theme
# (via showPostsLink / showTags). Only declare extra links here, e.g. About.
[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 1
